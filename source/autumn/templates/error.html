<!DOCTYPE html>
<html>
<head>
    <title>Melancholic Autumn</title>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body style="background-color: #1a1512;">
    <div class="fixed inset-0 flex items-center justify-center overflow-hidden">
        <div class="fixed inset-0 pointer-events-none" style="background-color: rgba(26, 21, 18, 0.95);">
        </div>

        <div class="relative z-10 text-center px-4">
            <div class="font-mono font-bold mb-6" style="font-size: 120px; line-height: 1; color: #F39C12; text-shadow: 0 2px 8px rgba(0,0,0,0.4);">
                {status}
            </div>

            <h1 class="font-bold mb-4" style="font-size: 32px; color: #FAF8F5;">
                {title}
            </h1>

            <p class="max-w-md mx-auto" style="font-size: 16px; line-height: 1.6; color: rgba(250, 248, 245, 0.8);"> 
                {details} 
            </p>
        </div>
    </div>
</body>
</html>
