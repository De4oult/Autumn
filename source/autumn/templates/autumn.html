<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Autumn</title>
        <script>
            (function() {
                const normalizedPath = window.location.pathname.replace(/\/+$/, '');
                const canonicalBase = normalizedPath.endsWith('/autumn')
                    ? normalizedPath
                    : normalizedPath.endsWith('/autumn/documentation') ||
                        normalizedPath.endsWith('/autumn/openapi') ||
                        normalizedPath.endsWith('/autumn/dependencies')
                        ? normalizedPath.replace(/\/(documentation|openapi|dependencies)$/, '/autumn')
                        : normalizedPath;

                const redirectTo = function(hashPath) {
                    window.location.replace(`${canonicalBase}/#${hashPath}${window.location.search}`);
                };

                if(window.location.hash === '#/documentation/api') {
                    redirectTo('/openapi');
                    return;
                }

                if(window.location.hash === '#/documentation/dependencies') {
                    redirectTo('/dependencies');
                    return;
                }

                if(window.location.hash.startsWith('#/documentation/dependencies/')) {
                    redirectTo(window.location.hash.replace('#/documentation', ''));
                    return;
                }

                if(window.location.hash)
                    return;

                if(
                    normalizedPath.endsWith('/autumn') ||
                    normalizedPath.endsWith('/autumn/documentation')
                ) {
                    redirectTo('/');
                    return;
                }

                if(normalizedPath.endsWith('/autumn/openapi')) {
                    redirectTo('/openapi');
                    return;
                }

                if(normalizedPath.endsWith('/autumn/dependencies'))
                    redirectTo('/dependencies');
            })();
        </script>
